services:
  # FastAPI backend
  - type: web
    name: recsys-backend
    runtime: python
    plan: free
    rootDir: apps/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        value: '["https://recsys-frontend.onrender.com"]'
      - key: MODEL_DIR
        value: ./model_artifacts
      - key: LOG_LEVEL
        value: INFO
      - key: DEBUG
        value: "false"

  # Next.js frontend
  - type: web
    name: recsys-frontend
    runtime: node
    plan: free
    rootDir: apps/frontend
    buildCommand: npm ci && npm run build
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: NEXT_PUBLIC_API_URL
        value: https://recsys-backend.onrender.com
      - key: NODE_ENV
        value: production
