services:
  # ─── FastAPI Backend ───────────────────────────────────────────────────────
  - type: web
    name: recsys-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    rootDir: apps/backend
    envVars:
      - key: DATABASE_URL
        sync: false          # Set this in Render dashboard — your Supabase connection string
      - key: CORS_ORIGINS
        value: '["https://recsys-frontend.onrender.com"]'
      - key: MODEL_DIR
        value: ./model_artifacts
      - key: LOG_LEVEL
        value: INFO
      - key: DEBUG
        value: "false"
    healthCheckPath: /health
    autoDeploy: true

  # ─── Next.js Frontend ─────────────────────────────────────────────────────
  - type: web
    name: recsys-frontend
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    rootDir: apps/frontend
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://recsys-backend.onrender.com
      - key: NODE_ENV
        value: production
    autoDeploy: true
